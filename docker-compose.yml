services:
  web:
    # Usa l'immagine da Docker Hub (scommenta e aggiorna con il tuo username)
    # image: exsnake/ddunlimited-search:latest
    # Oppure builda localmente (scommenta questa riga e commenta la riga image sopra)
    build: .
    container_name: ddunlimited-search-web
    ports:
      - "${FLASK_PORT:-5000}:5000"
    environment:
      - DDU_USERNAME=${DDU_USERNAME}
      - DDU_PASSWORD=${DDU_PASSWORD}
      - DATABASE_PATH=/app/data/ddunlimited.db
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - FLASK_DEBUG=${FLASK_DEBUG:-False}
      - REQUEST_DELAY=${REQUEST_DELAY:-1.5}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-30}
      - PAGES_FILE=${PAGES_FILE:-/app/pages.txt}
    volumes:
      - ./data:/app/data
      - ./pages.txt:/app/pages.txt
      - ./logs:/app/logs
    restart: unless-stopped

  scheduler:
    # Usa l'immagine da Docker Hub (scommenta e aggiorna con il tuo username)
    # image: exsnake/ddunlimited-search:latest
    # Oppure builda localmente (scommenta questa riga e commenta la riga image sopra)
    build: .
    container_name: ddunlimited-search-scheduler
    environment:
      - DDU_USERNAME=${DDU_USERNAME}
      - DDU_PASSWORD=${DDU_PASSWORD}
      - DATABASE_PATH=/app/data/ddunlimited.db
      - REQUEST_DELAY=${REQUEST_DELAY:-1.5}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-30}
      - PAGES_FILE=${PAGES_FILE:-/app/pages.txt}
      - SCRAPE_INTERVAL_DAYS=${SCRAPE_INTERVAL_DAYS:-3}
      - SCRAPE_HOUR=${SCRAPE_HOUR:-2}
      - SCRAPE_MINUTE=${SCRAPE_MINUTE:-0}
    volumes:
      - ./data:/app/data
      - ./pages.txt:/app/pages.txt
      - ./logs:/app/logs
    restart: unless-stopped
    command: ["python", "src/scheduler.py"]
