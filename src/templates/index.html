<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDUnlimited Search</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>DDUnlimited Search</h1>
            <p class="stats">{{ stats.total_titles }} titoli in {{ stats.total_sections }} sezioni</p>
            <p id="last-import-info" class="stats" style="font-size: 0.8rem; margin-top: 5px;"></p>
            <nav style="margin-top: 10px;">
                <a href="/" style="margin-right: 15px;">Ricerca</a>
                <a href="/sections" style="margin-right: 15px;">Sezioni</a>
                <a href="/admin" style="margin-right: 15px;">Amministrazione</a>
                <a href="/logs">Logs</a>
            </nav>
        </header>

        <main>
            <form id="search-form" class="search-form">
                <div class="search-row">
                    <input
                        type="text"
                        id="query"
                        name="q"
                        placeholder="Cerca titolo..."
                        autocomplete="off"
                    >
                    <input
                        type="text"
                        id="director"
                        name="director"
                        placeholder="Cerca regista..."
                        autocomplete="off"
                    >
                    <select id="search-type" name="search_type">
                        <option value="contains">Contiene</option>
                        <option value="starts_with">Inizia con</option>
                        <option value="ends_with">Finisce con</option>
                        <option value="all_words">Contiene tutte le parole</option>
                    </select>
                    <select id="section" name="section">
                        <option value="">Tutte le sezioni</option>
                        {% for section in sections %}
                        <option value="{{ section }}">{{ section }}</option>
                        {% endfor %}
                    </select>
                    <button type="submit">Cerca</button>
                </div>
                <div class="search-row-extra">
                    <label class="checkbox-label">
                        <input type="checkbox" id="include-deleted" name="include_deleted">
                        Mostra eliminati (404)
                    </label>
                </div>
            </form>

            <div id="results-info" class="results-info"></div>

            <div id="results" class="results"></div>

            <div id="pagination" class="pagination"></div>
        </main>

        <footer>
            <p>DDUnlimited Search - Solo per uso personale</p>
        </footer>
    </div>

    <script>
        const searchForm = document.getElementById('search-form');
        const queryInput = document.getElementById('query');
        const directorInput = document.getElementById('director');
        const searchTypeSelect = document.getElementById('search-type');
        const sectionSelect = document.getElementById('section');
        const includeDeletedCheckbox = document.getElementById('include-deleted');
        const resultsDiv = document.getElementById('results');
        const resultsInfoDiv = document.getElementById('results-info');
        const paginationDiv = document.getElementById('pagination');

        let currentPage = 1;
        let searchTimeout = null;

        // Check if we have enough input to search
        function hasSearchCriteria() {
            const query = queryInput.value.trim();
            const director = directorInput.value.trim();
            return query.length >= 2 || director.length >= 2;
        }

        // Debounced search on input
        queryInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                if (hasSearchCriteria()) {
                    currentPage = 1;
                    performSearch();
                } else {
                    clearResults();
                }
            }, 300);
        });

        // Debounced search on director input
        directorInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                if (hasSearchCriteria()) {
                    currentPage = 1;
                    performSearch();
                } else {
                    clearResults();
                }
            }, 300);
        });

        // Search on include_deleted change
        includeDeletedCheckbox.addEventListener('change', () => {
            if (hasSearchCriteria()) {
                currentPage = 1;
                performSearch();
            }
        });

        // Search on section or search type change
        sectionSelect.addEventListener('change', () => {
            if (hasSearchCriteria()) {
                currentPage = 1;
                performSearch();
            }
        });

        searchTypeSelect.addEventListener('change', () => {
            if (hasSearchCriteria()) {
                currentPage = 1;
                performSearch();
            }
        });

        // Form submit
        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (hasSearchCriteria()) {
                currentPage = 1;
                performSearch();
            }
        });

        function clearResults() {
            resultsDiv.innerHTML = '';
            resultsInfoDiv.innerHTML = '';
            paginationDiv.innerHTML = '';
        }

        async function performSearch() {
            const query = queryInput.value.trim();
            const director = directorInput.value.trim();
            const section = sectionSelect.value;
            const searchType = searchTypeSelect.value;

            if (!hasSearchCriteria()) {
                clearResults();
                return;
            }

            const params = new URLSearchParams({
                page: currentPage,
                search_type: searchType,
                include_deleted: includeDeletedCheckbox.checked
            });

            if (query) {
                params.set('q', query);
            }

            if (director) {
                params.set('director', director);
            }

            if (section) {
                params.set('section', section);
            }

            try {
                const response = await fetch(`/api/search?${params}`);
                const data = await response.json();

                if (data.error) {
                    resultsInfoDiv.innerHTML = `<p class="error">${data.error}</p>`;
                    return;
                }

                renderResults(data);
            } catch (error) {
                resultsInfoDiv.innerHTML = `<p class="error">Errore di connessione</p>`;
            }
        }

        function renderResults(data) {
            const { results, pagination } = data;

            // Results info
            if (pagination.total === 0) {
                resultsInfoDiv.innerHTML = '<p>Nessun risultato trovato</p>';
                resultsDiv.innerHTML = '';
                paginationDiv.innerHTML = '';
                return;
            }

            const start = (pagination.page - 1) * pagination.per_page + 1;
            const end = Math.min(start + results.length - 1, pagination.total);
            resultsInfoDiv.innerHTML = `<p>Risultati ${start}-${end} di ${pagination.total}</p>`;

            // Results list
            let html = '<ul class="results-list">';
            for (const item of results) {
                const director = item.director ? `<span class="director">${escapeHtml(item.director)}</span>` : '';
                const year = item.year ? `<span class="year">${item.year}</span>` : '';
                const quality = item.quality ? `<span class="quality">${item.quality}</span>` : '';
                const section = item.section ? `<span class="section">${item.section}</span>` : '';
                const deleted = item.deleted_at ? `<span class="deleted-badge">Eliminato (404)</span>` : '';
                const chips = buildChips(item);

                html += `
                    <li class="result-item${item.deleted_at ? ' result-deleted' : ''}">
                        <a href="${item.url}" target="_blank" class="title">${escapeHtml(item.title)}</a>
                        ${deleted}
                        <div class="item-meta">
                            ${section}
                            ${director}
                            ${year}
                            ${quality}
                            ${chips}
                        </div>
                    </li>
                `;
            }
            html += '</ul>';
            resultsDiv.innerHTML = html;

            // Pagination
            if (pagination.total_pages > 1) {
                let paginationHtml = '<div class="pagination-buttons">';

                if (pagination.has_prev) {
                    paginationHtml += `<button onclick="goToPage(${pagination.page - 1})">Precedente</button>`;
                }

                paginationHtml += `<span class="page-info">Pagina ${pagination.page} di ${pagination.total_pages}</span>`;

                if (pagination.has_next) {
                    paginationHtml += `<button onclick="goToPage(${pagination.page + 1})">Successiva</button>`;
                }

                paginationHtml += '</div>';
                paginationDiv.innerHTML = paginationHtml;
            } else {
                paginationDiv.innerHTML = '';
            }
        }

        function goToPage(page) {
            currentPage = page;
            performSearch();
            window.scrollTo(0, 0);
        }

        const FLAG_MAP = {
            'ITA': '🇮🇹', 'ENG': '🇬🇧', 'FRA': '🇫🇷', 'DEU': '🇩🇪',
            'SPA': '🇪🇸', 'POR': '🇵🇹', 'JPN': '🇯🇵', 'KOR': '🇰🇷',
            'CHN': '🇨🇳', 'RUS': '🇷🇺', 'ARA': '🇸🇦', 'NLD': '🇳🇱',
            'POL': '🇵🇱', 'TUR': '🇹🇷', 'SWE': '🇸🇪', 'NOR': '🇳🇴',
            'DAN': '🇩🇰', 'FIN': '🇫🇮',
        };
        const AUDIO_CODECS = new Set(['AC3','DTS','AAC','EAC3','TRUEHD','ATMOS','DD5','DD2','FLAC','MP3']);
        const VIDEO_CODECS = {'X264':'H.264','X265':'H.265','H264':'H.264','H265':'H.265','HEVC':'H.265','AVC':'H.264','XVID':'XviD','DIVX':'DivX'};
        const LANG_CODES = new Set(Object.keys(FLAG_MAP));

        function buildChips(item) {
            const rawParts = item.metadata
                ? item.metadata.split('|').map(p => p.trim()).filter(Boolean)
                : [];

            // Parse audio langs from "AC3 ITA" style tokens and standalone lang codes
            const audioLangs = item.languages
                ? item.languages.split('|').map(p => p.trim().toUpperCase())
                : [];
            const subLangs = [];
            let foundAudioCodec = null;
            let foundVideoCodec = null;

            const audioPriority = ['ATMOS','TRUEHD','DTS','EAC3','AC3','FLAC','AAC','MP3','DD5'];

            for (const part of rawParts) {
                const words = part.toUpperCase().split(/\s+/);
                const first = words[0];

                if (first === 'SUB' || first === 'MULTISUB') {
                    // "SUB ITA ENG" → sub languages
                    words.slice(1).filter(w => LANG_CODES.has(w)).forEach(l => subLangs.push(l));
                } else if (AUDIO_CODECS.has(first)) {
                    // "AC3 ITA" → codec + audio lang
                    if (!foundAudioCodec || audioPriority.indexOf(first) < audioPriority.indexOf(foundAudioCodec))
                        foundAudioCodec = first;
                    words.slice(1).filter(w => LANG_CODES.has(w)).forEach(l => { if (!audioLangs.includes(l)) audioLangs.push(l); });
                } else if (VIDEO_CODECS[first]) {
                    foundVideoCodec = first;
                } else if (LANG_CODES.has(first) && audioLangs.length === 0) {
                    // Legacy: standalone ITA/ENG = audio lang
                    audioLangs.push(first);
                }
            }

            // If no structured audio codec yet, fallback scan
            if (!foundAudioCodec) {
                foundAudioCodec = audioPriority.find(a => rawParts.some(p => p.toUpperCase().startsWith(a)));
            }
            if (!foundVideoCodec) {
                foundVideoCodec = Object.keys(VIDEO_CODECS).find(v => rawParts.some(p => p.toUpperCase().startsWith(v)));
            }

            const langFlags = langs => [...new Set(langs)]
                .map(l => FLAG_MAP[l] ? `${FLAG_MAP[l]}\u00a0${l}` : l).join(' ');

            const langChips = audioLangs.length
                ? `<span class="lang">🎵 ${langFlags(audioLangs)}</span>` : '';

            const audioLabel = {'TRUEHD':'TrueHD','ATMOS':'Atmos','EAC3':'EAC3'}[foundAudioCodec] || foundAudioCodec;
            const audioChip = foundAudioCodec ? `<span class="audio-codec">🔊 ${audioLabel}</span>` : '';

            const videoChip = foundVideoCodec ? `<span class="video-codec">🎬 ${VIDEO_CODECS[foundVideoCodec]}</span>` : '';

            const subChip = (subLangs.length || rawParts.some(p => /^MULTISUB$/i.test(p.trim())))
                ? `<span class="sub">📄 SUB${subLangs.length ? ' ' + langFlags(subLangs) : ''}</span>` : '';

            const statusChip = item.status ? `<span class="status">${escapeHtml(item.status)}</span>` : '';

            return langChips + audioChip + videoChip + subChip + statusChip;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load last import info
        async function loadLastImportInfo() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                const lastImportInfo = document.getElementById('last-import-info');
                
                if (data.last_import && data.last_import.completed_at) {
                    const completedAt = new Date(data.last_import.completed_at);
                    const now = new Date();
                    const diffMs = now - completedAt;
                    const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                    const diffHours = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    
                    let timeAgo = '';
                    if (diffDays > 0) {
                        timeAgo = `${diffDays} giorn${diffDays > 1 ? 'i' : 'o'} fa`;
                    } else if (diffHours > 0) {
                        timeAgo = `${diffHours} or${diffHours > 1 ? 'e' : 'a'} fa`;
                    } else {
                        timeAgo = 'poco fa';
                    }
                    
                    const status = data.last_import.status === 'completed' ? '✓' : '⚠';
                    lastImportInfo.textContent = `${status} Ultima importazione: ${timeAgo} (${completedAt.toLocaleString('it-IT')})`;
                    lastImportInfo.style.color = data.last_import.status === 'completed' ? '#27ae60' : '#e74c3c';
                } else {
                    lastImportInfo.textContent = 'Nessuna importazione completata';
                    lastImportInfo.style.color = '#888';
                }
            } catch (error) {
                console.error('Error loading last import info:', error);
            }
        }

        // Load last import info on page load
        loadLastImportInfo();
        // Refresh every 5 minutes
        setInterval(loadLastImportInfo, 5 * 60 * 1000);
    </script>
</body>
</html>
